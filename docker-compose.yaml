x-logging: &logging
    driver: json-file
    options:
        max-size: "10m"
        max-file: "5"

services:
    php: &php-base
        image: ${APP_ID}-php:latest
        build:
            context: .
            dockerfile: docker/php/Dockerfile
        restart: unless-stopped
        container_name: ${APP_ID}-php
        command: ["php-fpm", "-F"]
        logging: *logging
        volumes:
            - ./docker/php/php-fpm.conf:/usr/local/etc/php-fpm.d/zz-docker.conf
            - ./docker/php/php.${APP_ENV}.ini:/usr/local/etc/php/conf.d/99-bitrix.ini
            - ./docker/php/msmtprc:/etc/msmtprc
            - ./docker/php/crontab:/etc/crontabs/www-data
            - ./docker/certs:/opt/certs
            - ./www:/var/www/bitrix
        env_file:
            - .env

    cron:
        <<: *php-base
        container_name: ${APP_ID}-cron
        command: ["supercronic", "-quiet", "/etc/crontabs/www-data"]
        depends_on:
            mysql:
                condition: service_healthy
            redis:
                condition: service_healthy

    nginx:
        container_name: ${APP_ID}-nginx
        image: nginx:stable-alpine
        restart: unless-stopped
        logging: *logging
        ports:
            - "80:80"
            - "443:443"
        volumes:
            - ./www:/var/www/bitrix
            - ./docker/nginx/bitrix.conf:/etc/nginx/bitrix.conf
            - ./docker/nginx/${APP_ENV}.conf:/etc/nginx/conf.d/default.conf
            - ./docker/certs:/etc/nginx/ssl
        depends_on:
            - php
        networks:
            default:
                aliases:
                    - ${APP_DEV_DOMAIN}

    mysql:
        container_name: ${APP_ID}-mysql
        image: mariadb:12
        restart: unless-stopped
        logging: *logging
        ports:
            - "3306:3306"
        volumes:
            - ./docker/mysql/my.${APP_ENV}.cnf:/etc/mysql/conf.d/99-bitrix.cnf
            - ./storage/mysql:/var/lib/mysql
        env_file:
            - .env
        healthcheck:
            test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
            interval: 10s
            timeout: 5s
            retries: 5

    redis:
        container_name: ${APP_ID}-redis
        image: redis:8-alpine
        restart: unless-stopped
        logging: *logging
        ports:
            - "6379:6379"
        volumes:
            - ./docker/redis/redis.${APP_ENV}.conf:/usr/local/etc/redis/redis.conf
            - ./storage/redis:/data
        command: ["redis-server", "/usr/local/etc/redis/redis.conf"]
        healthcheck:
            test: ["CMD", "redis-cli", "ping"]
            interval: 10s
            timeout: 5s
            retries: 5

networks:
    default:
        name: ${APP_ID}-network
